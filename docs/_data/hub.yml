categories:
  - name: Templates
    items:
      - name: deepagents/default
        description: Recommended AgentSeek harness app with a local `create_deep_agent(...)` runnable bound through `agentseek-langchain`.
        description_zh: 推荐的 AgentSeek harness app，通过 `agentseek-langchain` 绑定本地 `create_deep_agent(...)` runnable。
        create: uvx agentseek create deepagents/default --no-input
        badges:
          - label: template
        tags:
          - template
          - deepagents
          - harness
          - langchain
          - runtime-data

      - name: deepagents/research
        description: Pure DeepAgents research agent with Tavily search and streamed tool/sub-agent UI.
        description_zh: 带 Tavily 搜索和 streamed tool/sub-agent UI 的纯 DeepAgents research agent。
        create: uvx agentseek create deepagents/research --no-input
        badges:
          - label: template
        tags:
          - template
          - deepagents
          - research
          - tavily
          - streaming

      - name: deepagents/content-builder
        description: DeepAgents content builder with brand memory, skills, subagents, image generation, and streamed UI.
        description_zh: 带品牌记忆、skills、subagents、图片生成和 streamed UI 的 DeepAgents content builder。
        create: uvx agentseek create deepagents/content-builder --no-input
        badges:
          - label: template
        tags:
          - template
          - deepagents
          - content
          - memory
          - image-generation

      - name: langchain/default
        description: LangChain `create_agent` with CopilotKit middleware over `agentseek-langchain`.
        description_zh: 通过 `agentseek-langchain` 接入的 LangChain `create_agent` + CopilotKit middleware。
        create: uvx agentseek create langchain/default --no-input
        badges:
          - label: template
        tags:
          - template
          - langchain
          - copilotkit
          - harness

      - name: langchain/cli-remote
        description: Remote LangGraph CLI agent bridged through `LangGraphClientRunnable`.
        description_zh: 通过 `LangGraphClientRunnable` 桥接的远程 LangGraph CLI agent。
        create: uvx agentseek create langchain/cli-remote --no-input
        badges:
          - label: template
        tags:
          - template
          - langchain
          - langgraph
          - remote

      - name: langchain/sandbox
        description: DeepAgents sandbox coding agent with LangSmith sandbox backend and streaming UI.
        description_zh: 带 LangSmith sandbox 后端和 streaming UI 的 DeepAgents coding agent。
        create: uvx agentseek create langchain/sandbox --no-input
        badges:
          - label: template
        tags:
          - template
          - langchain
          - deepagents
          - sandbox
          - coding

      - name: langchain/markdown-messages
        description: Pure LangChain `create_agent` with `langgraph dev` backend and markdown-rendering React frontend.
        description_zh: 纯 LangChain `create_agent`，使用 `langgraph dev` 后端和支持 Markdown 渲染的 React 前端。
        create: uvx agentseek create langchain/markdown-messages --no-input
        badges:
          - label: template
        tags:
          - template
          - langchain
          - langgraph
          - markdown
          - frontend

      - name: bub/default
        description: Lightweight Bub agent with `agentseek gateway` and a CopilotKit frontend, without LangChain.
        description_zh: 轻量 Bub agent，包含 `agentseek gateway` 和 CopilotKit 前端，不使用 LangChain。
        create: uvx agentseek create bub/default --no-input
        badges:
          - label: template
        tags:
          - template
          - bub
          - gateway
          - copilotkit
          - no-langchain

      - name: bub/contextseek
        description: Bub agent with ContextSeek semantic memory layer and ctx HTTP API.
        description_zh: 带 ContextSeek 语义记忆层和 ctx HTTP API 的 Bub agent。
        create: uvx agentseek create bub/contextseek --no-input
        badges:
          - label: template
        tags:
          - template
          - bub
          - contextseek
          - memory
          - ctx

  - name: Plugins
    items:
      - name: agentseek-ag-ui
        description: AG-UI channel adapter for `agentseek gateway`, translating Bub stream events into AG-UI SSE events.
        description_zh: 面向 `agentseek gateway` 的 AG-UI channel 适配器，把 Bub 流式事件转换成 AG-UI SSE 事件。
        entry_point: ag-ui
        install: agentseek plugin install agentseek-ag-ui
        repo_url: https://github.com/ob-labs/agentseek/tree/main/contrib/agentseek-ag-ui
        readme_url: https://github.com/ob-labs/agentseek/blob/main/contrib/agentseek-ag-ui/README.md
        badges:
          - label: plugin
        tags:
          - ag-ui
          - channel
          - gateway
          - fastapi
          - sse
          - frontend
          - ui

      - name: agentseek-contextseek
        description: Semantic context layer that retrieves relevant past knowledge before each model turn and writes new knowledge back afterward.
        description_zh: 语义化的上下文层，在每次模型轮次前检索相关的历史知识，并在轮次后回写新知识。
        entry_point: contextseek
        install: agentseek plugin install agentseek-contextseek
        repo_url: https://github.com/ob-labs/agentseek/tree/main/contrib/agentseek-contextseek
        readme_url: https://github.com/ob-labs/agentseek/blob/main/contrib/agentseek-contextseek/README.md
        badges:
          - label: plugin
        tags:
          - context
          - contextseek
          - semantic
          - memory
          - retrieval
          - knowledge

      - name: agentseek-schedule-sqlalchemy
        description: SQLAlchemy-backed APScheduler job persistence exposed as the Bub `schedule` plugin.
        description_zh: 以 SQLAlchemy 为后端的 APScheduler 持久化实现，对外暴露为 Bub `schedule` 插件。
        entry_point: schedule
        repo_url: https://github.com/ob-labs/agentseek/tree/main/contrib/agentseek-schedule-sqlalchemy
        readme_url: https://github.com/ob-labs/agentseek/blob/main/contrib/agentseek-schedule-sqlalchemy/README.md
        badges:
          - label: plugin
          - label: bundled
            class: subtle
        tags:
          - scheduler
          - apscheduler
          - sqlalchemy
          - jobs
          - persistence
          - schedule

      - name: agentseek-tapestore-oceanbase
        description: SQLAlchemy tape storage with OceanBase compatibility and optional vector retrieval.
        description_zh: 兼容 OceanBase 的 SQLAlchemy tape storage，并支持可选的向量检索能力。
        entry_point: tapestore-oceanbase
        install: agentseek plugin install agentseek-tapestore-oceanbase
        repo_url: https://github.com/ob-labs/agentseek/tree/main/contrib/agentseek-tapestore-oceanbase
        readme_url: https://github.com/ob-labs/agentseek/blob/main/contrib/agentseek-tapestore-oceanbase/README.md
        badges:
          - label: plugin
        tags:
          - tape
          - store
          - sqlalchemy
          - oceanbase
          - vector
          - retrieval
          - embeddings

      - name: agentseek-langchain
        description: Delegates Bub model turns to a LangChain `Runnable` while keeping agentseek transport and persistence in place.
        description_zh: 将 Bub 的模型轮次委托给 LangChain `Runnable`，同时保留 agentseek 的传输层与持久化能力。
        entry_point: langchain
        install: agentseek plugin install agentseek-langchain
        repo_url: https://github.com/ob-labs/agentseek/tree/main/contrib/agentseek-langchain
        readme_url: https://github.com/ob-labs/agentseek/blob/main/contrib/agentseek-langchain/README.md
        badges:
          - label: plugin
        tags:
          - langchain
          - runnable
          - agent
          - graph
          - routing
          - model

  - name: Skills
    items:
      - name: plugin-creator
        description: Create or update agentseek/Bub plugins while following this repository's contrib layout and packaging conventions.
        description_zh: 按照本仓库的 contrib 目录布局与打包约定，创建或更新 agentseek/Bub 插件。
        path: src/skills/plugin-creator
        skill_url: https://github.com/ob-labs/agentseek/blob/main/src/skills/plugin-creator/SKILL.md
        badges:
          - label: skill
            class: skill
          - label: bundled
            class: subtle
        tags:
          - bundled
          - bub
          - plugin
          - scaffold
          - contrib
          - packaging
          - hooks
          - entry-point

      - name: github-repo-cards
        description: Fetch GitHub repository or trending data through `gh`, then render SVG or PNG repo cards.
        description_zh: 通过 `gh` 拉取 GitHub 仓库或 trending 数据，再渲染成 SVG 或 PNG 仓库卡片。
        path: skills/github-repo-cards
        skill_url: https://github.com/ob-labs/agentseek/blob/main/skills/github-repo-cards/SKILL.md
        badges:
          - label: skill
            class: skill
        tags:
          - github
          - repo
          - trending
          - card
          - svg
          - png
          - gh

      - name: local-greeting
        description: Minimal local skill used to smoke-test workspace skill loading and runtime mounts during development.
        description_zh: 一个最小化本地 skill，用于开发时验证工作区 skill 加载和运行时挂载是否正常。
        path: .agents/skills/local-greeting
        skill_url: https://github.com/ob-labs/agentseek/blob/main/.agents/skills/local-greeting/SKILL.md
        badges:
          - label: skill
            class: skill
          - label: local
            class: subtle
        tags:
          - local
          - smoke-test
          - workspace
          - greeting

      - name: documentation-writer
        description: Diátaxis-oriented technical writing skill (from awesome-copilot) for drafting and reviewing docs.
        description_zh: 面向 Diátaxis 的技术写作 skill（来自 awesome-copilot），用于起草和审阅文档。
        path: .agents/skills/documentation-writer
        skill_url: https://github.com/ob-labs/agentseek/blob/main/.agents/skills/documentation-writer/SKILL.md
        badges:
          - label: skill
            class: skill
          - label: local
            class: subtle
        tags:
          - documentation
          - diataxis
          - writing
          - awesome-copilot

  - name: Friends
    items:
      - name: bub
        description: The core Bub runtime that agentseek packages and extends. For the broader ecosystem, start here.
        description_zh: agentseek 打包并扩展的 Bub 核心运行时。要理解更大的生态，可以先从这里开始。
        repo_url: https://github.com/bubbuild/bub
        readme_url: https://github.com/bubbuild/bub/blob/main/README.md
        badges:
          - label: friend
        tags:
          - bub
          - runtime
          - hooks
          - channels
          - skills
          - ecosystem
