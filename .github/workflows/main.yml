name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run lint and type check
        run: make lint typecheck

  tests-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: make test

      - name: Check typing
        run: make typecheck

  contrib-package-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"

      - name: Run contrib package checks
        run: make check-contrib

  agentseek-phoenix-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"

      - name: Render langchain/default template
        run: |
          set -euo pipefail
          smoke_root="${RUNNER_TEMP}/agentseek-phoenix-smoke"
          mkdir -p "${smoke_root}"
          cd "${smoke_root}"
          uv run --project "${GITHUB_WORKSPACE}" agentseek create langchain/default --no-input
          echo "AGENTSEEK_PHOENIX_SMOKE_PROJECT=${smoke_root}/my_langchain_agent" >> "${GITHUB_ENV}"

      - name: Verify rendered compose images
        run: |
          set -euo pipefail
          cd "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}"
          cp .env.example .env
          docker compose config --images | tee /tmp/agentseek-phoenix-images.txt
          grep -Fx "ghcr.io/agentseek-ai/agentseek-phoenix:main" /tmp/agentseek-phoenix-images.txt
          grep -Fx "quay.io/oceanbase/seekdb:latest" /tmp/agentseek-phoenix-images.txt
          ! grep -F "ghcr.io/psiace/phoenix:mysql" /tmp/agentseek-phoenix-images.txt

      - name: Start Phoenix with OceanBase seekdb
        run: |
          set -euo pipefail
          cd "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}"
          docker compose pull seekdb phoenix
          docker compose up -d seekdb phoenix

          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:6006 >/dev/null; then
              exit 0
            fi
            echo "Waiting for Phoenix (${attempt}/90)..."
            sleep 5
          done

          docker compose ps
          docker compose logs --no-color --tail=200 seekdb phoenix
          exit 1

      - name: Verify OceanBase seekdb SQL connectivity
        run: |
          set -euo pipefail
          cd "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}"
          docker compose exec -T seekdb mysql -h127.0.0.1 -P2881 -uroot -e "SELECT 1"

      - name: Verify Phoenix trace persistence in OceanBase seekdb
        run: |
          set -euo pipefail
          cd "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}"
          export TRACE_COUNT=3

          uv run \
            --with opentelemetry-sdk \
            --with opentelemetry-exporter-otlp-proto-http \
            python - <<'PY'
          import os

          from opentelemetry import trace
          from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
          from opentelemetry.sdk.resources import Resource
          from opentelemetry.sdk.trace import TracerProvider
          from opentelemetry.sdk.trace.export import SimpleSpanProcessor

          trace_count = int(os.environ["TRACE_COUNT"])
          run_id = os.environ["GITHUB_RUN_ID"]
          run_attempt = os.environ["GITHUB_RUN_ATTEMPT"]
          provider = TracerProvider(
              resource=Resource.create(
                  {
                      "service.name": "agentseek-phoenix-ci",
                      "agentseek.trace.backend": "OceanBase seekdb",
                  }
              )
          )
          provider.add_span_processor(
              SimpleSpanProcessor(
                  OTLPSpanExporter(endpoint="http://127.0.0.1:6006/v1/traces")
              )
          )
          trace.set_tracer_provider(provider)

          tracer = trace.get_tracer("agentseek.phoenix.ci")
          trace_markers = []
          trace_ids = set()
          for index in range(1, trace_count + 1):
              trace_name = f"agentseek-ci-trace-{run_id}-{run_attempt}-{index}"
              trace_markers.append(trace_name)
              with tracer.start_as_current_span(trace_name) as span:
                  span_context = span.get_span_context()
                  trace_ids.add(span_context.trace_id)
                  span.set_attribute("agentseek.trace.proof", trace_name)
                  span.set_attribute("agentseek.trace.index", index)
                  span.set_attribute("agentseek.trace.backend", "OceanBase seekdb")
              print(f"Emitted trace span: {trace_name} trace_id={span_context.trace_id:032x}")

          if len(trace_ids) != trace_count:
              raise RuntimeError(
                  f"Expected {trace_count} independent trace IDs, got {len(trace_ids)}"
              )

          with open("/tmp/agentseek-trace-markers.txt", "w", encoding="utf-8") as marker_file:
              marker_file.write("\n".join(trace_markers) + "\n")

          if not provider.force_flush(timeout_millis=10000):
              raise RuntimeError("Timed out flushing OpenTelemetry spans to Phoenix")
          provider.shutdown()
          PY

          cat > /tmp/find-agentseek-trace.sql <<SQL
          SET SESSION group_concat_max_len = 1000000;
          SELECT GROUP_CONCAT(
            CONCAT(
              'SELECT COUNT(*) AS matches FROM \`', TABLE_SCHEMA, '\`.\`', TABLE_NAME,
              '\` WHERE CAST(\`', COLUMN_NAME, '\` AS CHAR) LIKE ''%', @needle, '%'''
            )
            SEPARATOR ' UNION ALL '
          ) INTO @sql
          FROM information_schema.columns
          WHERE table_schema = 'phoenix'
            AND data_type IN ('char', 'varchar', 'tinytext', 'text', 'mediumtext', 'longtext', 'json');
          SET @sql = CONCAT('SELECT COALESCE(SUM(matches), 0) FROM (', @sql, ') AS trace_matches');
          PREPARE stmt FROM @sql;
          EXECUTE stmt;
          DEALLOCATE PREPARE stmt;
          SQL

          verified_count=0
          for marker in $(cat /tmp/agentseek-trace-markers.txt); do
            marker_found=0
            for attempt in $(seq 1 30); do
              {
                printf "SET @needle = '%s';\n" "${marker}"
                cat /tmp/find-agentseek-trace.sql
              } > /tmp/find-agentseek-trace-marker.sql

              matches="$(
                docker compose exec -T seekdb mysql -h127.0.0.1 -P2881 -uroot -N -B < /tmp/find-agentseek-trace-marker.sql \
                  | tail -n 1 \
                  | tr -d '\r'
              )"
              if [ "${matches:-0}" -gt 0 ]; then
                echo "Found ${matches} persisted Phoenix trace marker(s) for ${marker} in OceanBase seekdb."
                marker_found=1
                verified_count=$((verified_count + 1))
                break
              fi
              echo "Waiting for Phoenix trace persistence for ${marker} (${attempt}/30)..."
              sleep 2
            done

            if [ "${marker_found}" -ne 1 ]; then
              echo "Missing persisted Phoenix trace marker ${marker} in OceanBase seekdb."
              docker compose exec -T seekdb mysql -h127.0.0.1 -P2881 -uroot phoenix -e "SHOW TABLES"
              docker compose logs --no-color --tail=200 phoenix
              exit 1
            fi
          done

          expected_count="$(wc -l < /tmp/agentseek-trace-markers.txt | tr -d ' ')"
          if [ "${verified_count}" -ne "${expected_count}" ]; then
            echo "Expected ${expected_count} trace markers, verified ${verified_count}."
            exit 1
          fi
          echo "Verified ${verified_count} Phoenix trace markers persisted in OceanBase seekdb."

      - name: Clean up smoke stack
        if: always()
        run: |
          if [ -n "${AGENTSEEK_PHOENIX_SMOKE_PROJECT:-}" ] && [ -d "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}" ]; then
            cd "${AGENTSEEK_PHOENIX_SMOKE_PROJECT}"
            docker compose ps || true
            docker compose logs --no-color --tail=200 seekdb phoenix || true
            docker compose down -v || true
          fi



  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: uv run mkdocs build -s
