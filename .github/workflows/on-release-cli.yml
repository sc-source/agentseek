name: Release agentseek-cli

on:
  push:
    tags:
      - "cli-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build agentseek-cli sdist and wheel
        working-directory: contrib/agentseek-cli
        run: python -m build

      - name: Check artifacts
        run: twine check contrib/agentseek-cli/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-agentseek-cli
          path: contrib/agentseek-cli/dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentseek-cli
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-agentseek-cli
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-agentseek-cli
          path: dist/

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading dist/*."
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            echo "No release found for ${GITHUB_REF_NAME}; creating one."
            NOTES_FILE="$(mktemp)"
            echo "AgentSeek CLI release ${GITHUB_REF_NAME}. See contrib/agentseek-cli/README.md for usage." > "${NOTES_FILE}"
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              dist/*
          fi
